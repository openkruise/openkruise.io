name: Doc Agent Manual

on:
  workflow_dispatch:
    inputs:
      create_pr:
        description: "Create draft PR"
        required: false
        default: false
        type: boolean

jobs:
  doc-agent:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    concurrency:
      group: doc-agent-manual-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect
        run: python -m agent.cli collect --repo-root . --output inventory.json

      - name: Evaluate
        run: python -m agent.cli evaluate --repo-root . --output-dir agent/artifacts

      - name: Score
        run: python -m agent.cli score --input-dir agent/artifacts --output scorecard.json

      - name: Stage
        run: python -m agent.cli stage --input-dir agent/artifacts --output-dir agent/staging

      - name: Report
        run: python -m agent.cli report --input-dir agent/artifacts --output-dir agent/reports

      - name: Open Draft PR
        if: ${{ inputs.create_pr }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m agent.cli open-pr \
            --repo-root . \
            --config agent/config.yaml.example \
            --artifacts-dir agent/artifacts \
            --staging-dir agent/staging \
            --report-dir agent/reports \
            --create-pr \
            --execute

      - name: Upload Reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: doc-agent-reports
          path: agent/reports/**
          retention-days: 7

      - name: Upload Staging
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: doc-agent-staging
          path: agent/staging/**
          retention-days: 7
